name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install OZ + forge-std
        working-directory: contracts
        run: forge install
      - name: Build
        working-directory: contracts
        run: forge build --sizes
      - name: Test (unit + invariant + parity)
        working-directory: contracts
        run: forge test -vv
      - name: Coverage (money paths must stay >= 95%)
        working-directory: contracts
        run: forge coverage --no-match-coverage "(test|script)" --report summary
      - name: Gas snapshot
        working-directory: contracts
        run: forge snapshot --check || forge snapshot

  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install deps
        working-directory: contracts
        run: forge install
      - uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: medium

  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd shared && npm install && npm run typecheck && npm test

  indexer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd shared && npm install
      - run: cd indexer && npm install && npm run typecheck && npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd shared && npm install
      - run: cd web && npm install && npm run build
