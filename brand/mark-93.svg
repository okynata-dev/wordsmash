    <radialGradient id="orb" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#8fb0ff"/>
      <stop offset="0.6" stop-color="#1230ff"/>
      <stop offset="1" stop-color="#0000d0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="46" fill="url(#orb)"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="#5b8cff" stroke-width="5"/>
  <circle cx="157" cy="53" r="11" fill="#0000ff"/>
</svg>
